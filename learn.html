<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>学習モード — HANDIT!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* レベル選択画面 */
    .level-wrap {
      max-width: 520px; margin: 0 auto;
      padding: 24px 20px 60px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .level-header {
      display: flex; align-items: center; gap: 12px;
    }
    .level-page-title { font-size: 22px; font-weight: 800; flex: 1; }

    .level-list { display: flex; flex-direction: column; gap: 12px; }
    .level-card {
      background: var(--white); border: 1.5px solid var(--line);
      border-radius: var(--radius); padding: 20px 22px;
      display: flex; align-items: center; gap: 16px;
      box-shadow: var(--shadow);
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }
    .level-card:hover  { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .level-card:active { transform: translateY(0); }
    .level-card.locked { opacity: 0.5; cursor: not-allowed; }
    .level-card.locked:hover { transform: none; box-shadow: var(--shadow); }

    .level-num {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; flex-shrink: 0;
      font-family: -apple-system, sans-serif;
    }
    .level-info { flex: 1; }
    .level-title { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
    .level-words { font-size: 12px; color: var(--ink-3); }
    .level-status { font-size: 22px; }

    .level-card.cleared .level-num { background: var(--accent-l); color: var(--accent-d); }
    .level-card.available .level-num { background: #E8F1FC; color: var(--blue); }
    .level-card.locked .level-num { background: var(--line); color: var(--ink-3); }
  </style>
</head>
<body>

<!-- ローディング -->
<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">読み込み中...</div>
</div>

<!-- ナビ -->
<nav class="topbar">
  <img src="handit_logo.png" alt="HANDIT!" class="topbar-logo"/>
  <div class="topbar-nav">
    <a href="index.html" class="topbar-link">← ホーム</a>
  </div>
</nav>

<!-- ===== レベル選択 ===== -->
<div id="view-levels">
  <div class="level-wrap">
    <div class="level-header">
      <div class="level-page-title">📚 学習モード</div>
    </div>
    <div class="level-list" id="level-list"></div>
  </div>
</div>

<!-- ===== レッスン画面 ===== -->
<div class="lesson-screen" id="view-lesson">
  <div class="ls-header">
    <button class="ls-back" id="back-lesson">✕</button>
    <div class="ls-progress-wrap">
      <div class="ls-progress-bar" id="ls-progress" style="width:0%"></div>
    </div>
  </div>
  <div class="ls-body">
    <div class="ls-prompt">
      <div class="ls-prompt-label">この手話をやってみよう</div>
      <div class="ls-prompt-word" id="challenge-word">—</div>
    </div>
    <div class="camera-wrap">
      <video id="video-lesson" autoplay playsinline muted></video>
      <canvas id="canvas-lesson"></canvas>
    </div>
    <div class="hold-track"><div class="hold-fill" id="hold-fill"></div></div>
    <div class="detect-bar">
      <div class="detect-dot" id="lesson-dot"></div>
      <div class="detect-label" id="lesson-label">手話を始めてください</div>
      <div class="detect-conf"  id="lesson-conf"></div>
    </div>
  </div>
</div>

<!-- ===== 完了画面 ===== -->
<div class="complete-screen" id="view-complete">
  <div class="complete-emoji">🎉</div>
  <div class="complete-title">レベルクリア！</div>
  <div class="complete-sub" id="complete-sub"></div>
  <div class="complete-stats">
    <div class="complete-stat">
      <div class="complete-stat-num" id="c-correct">0</div>
      <div class="complete-stat-label">正解</div>
    </div>
    <div class="complete-stat">
      <div class="complete-stat-num" id="c-xp">+0</div>
      <div class="complete-stat-label">XP獲得</div>
    </div>
  </div>
  <a href="#" class="complete-home-btn" id="complete-back-btn">レベル選択に戻る</a>
</div>

<!-- フィードバック -->
<div class="feedback-overlay" id="feedback">
  <div class="feedback-title" id="fb-title"></div>
  <div class="feedback-sub"   id="fb-sub"></div>
  <button class="feedback-btn" id="fb-btn">つぎへ</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.16.3/dist/ort.min.js"></script>
<script src="app.js"></script>
</body>
</html>
